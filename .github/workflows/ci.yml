name: CI — Full Regression

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  SA_PASSWORD: "Ci_Test_Pwd_99!"
  TEST_DATABASE_URL: "mssql+pyodbc://sa:Ci_Test_Pwd_99!@localhost:1433/gpu_margin?driver=ODBC+Driver+17+for+SQL+Server&encrypt=no"

jobs:
  # ── Backend: pytest against real MSSQL ──────────────────────────
  backend:
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "Ci_Test_Pwd_99!"
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Ci_Test_Pwd_99!' -Q 'SELECT 1' -C -b -o /dev/null"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - name: Install ODBC Driver 17
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17 unixodbc-dev

      - name: Create gpu_margin database
        run: |
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$SA_PASSWORD" -C -Q "CREATE DATABASE gpu_margin;"

      - name: Run Flyway migrations
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/phase_zero/db/migrations:/flyway/sql \
            flyway/flyway:9 \
            -url="jdbc:sqlserver://localhost:1433;databaseName=gpu_margin;encrypt=false" \
            -user=sa \
            -password="$SA_PASSWORD" \
            migrate

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        working-directory: phase_zero
        run: |
          pip install -r requirements.txt
          pip install openpyxl httpx

      - name: Run pytest
        working-directory: phase_zero
        run: python -m pytest tests/ -v --tb=short

  # ── Frontend: vitest ────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: phase_zero/frontend/package-lock.json

      - name: Install dependencies
        working-directory: phase_zero/frontend
        run: npm ci

      - name: Run vitest
        working-directory: phase_zero/frontend
        run: npx vitest run

      - name: TypeScript check
        working-directory: phase_zero/frontend
        run: npx tsc --noEmit
