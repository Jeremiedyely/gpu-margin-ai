services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gpu_margin_db
    platform: linux/amd64
    env_file:
      - .env
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${DB_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: [
        "CMD-SHELL",
        "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${DB_SA_PASSWORD}\" -Q \"SELECT 1\" -C -b -o /dev/null"
      ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped


  db_init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gpu_margin_db_init
    platform: linux/amd64
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db/init:/init
    entrypoint: ["/bin/bash", "/init/init_db.sh"]
    restart: "no"


  flyway:
    image: flyway/flyway:9
    container_name: gpu_margin_flyway
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      db_init:
        condition: service_completed_successfully
    volumes:
      - ./db/migrations:/flyway/sql
    command:
      - -url=jdbc:sqlserver://db:1433;databaseName=gpu_margin;encrypt=false
      - -user=sa
      - -password=${DB_SA_PASSWORD}
      - migrate


  redis:
    image: redis:7-alpine
    container_name: gpu_margin_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped


  web:
    image: gpu_margin_app
    container_name: gpu_margin_web
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL}"
      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND}"
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    restart: unless-stopped


  celery_worker:
    image: gpu_margin_app
    container_name: gpu_margin_celery_worker
    build: .
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL}"
      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND}"
    volumes:
      - ./app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    restart: unless-stopped

  celery_beat:
    image: gpu_margin_app
    container_name: gpu_margin_celery_beat
    build: .
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL}"
      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped


volumes:
  sqlserver_data:
    driver: local

  redis_data:
    driver: local
